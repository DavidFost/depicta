<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Not Found — Depicta Web Services</title>
  <meta name="robots" content="noindex, follow">
  <link rel="icon" type="image/png" href="assets/depicta_favicon.png">
  <link rel="apple-touch-icon" href="assets/depicta_favicon.png">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;0,600;0,700;1,400;1,600&family=Source+Sans+3:wght@300;400;500;600&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="css/style.css?v=2">
  <style>
    .error-page {
      min-height: calc(100vh - 72px);
      display: flex;
      align-items: center;
      justify-content: center;
      background-color: var(--cream);
      background-image: radial-gradient(circle, rgba(122,106,58,0.15) 1px, transparent 1px);
      background-size: 24px 24px;
      text-align: center;
      padding: 4rem 1.5rem;
      position: relative;
      overflow: hidden;
    }
    .error-page__geo {
      position: absolute;
      right: -40px;
      top: 50%;
      transform: translateY(-50%);
      width: 280px;
      height: 320px;
      color: var(--gold);
      opacity: 0.07;
      pointer-events: none;
    }
    .error-page__inner {
      position: relative;
      z-index: 1;
      max-width: 480px;
    }
    .error-page__num {
      font-family: var(--font-serif);
      font-size: clamp(5rem, 15vw, 9rem);
      font-weight: 700;
      color: var(--gold);
      opacity: 0.25;
      line-height: 1;
      letter-spacing: -0.04em;
      margin-bottom: 1rem;
    }
    .error-page__rule {
      width: 40px;
      height: 3px;
      background: var(--gold);
      margin: 0 auto 1.75rem;
    }
    .error-page h1 {
      font-size: clamp(1.5rem, 3vw, 2rem);
      margin-bottom: 1rem;
    }
    .error-page p {
      color: var(--brown-mid);
      font-size: 1rem;
      line-height: 1.75;
      margin-bottom: 2rem;
    }
    .error-page__actions {
      display: flex;
      gap: 1rem;
      justify-content: center;
      flex-wrap: wrap;
    }
  </style>
</head>
<body>

  <header class="nav" id="nav">
    <div class="container nav__inner">
      <a href="index.html" class="nav__logo" aria-label="Depicta Web Services Home">
        <img src="assets/logo.png" alt="Depicta Web Services" fetchpriority="high">
      </a>
      <button class="nav__toggle" id="navToggle" aria-label="Open menu" aria-expanded="false" aria-controls="navLinks">
        <span></span><span></span><span></span>
      </button>
      <nav class="nav__links" id="navLinks" aria-label="Main navigation">
        <a href="services.html">Services</a>
        <a href="about.html">About</a>
        <a href="contact.html">Contact</a>
        <a href="contact.html" class="btn btn--gold btn--sm">Get in Touch</a>
      </nav>
    </div>
  </header>

  <main>
    <div class="error-page">
      <svg class="error-page__geo" aria-hidden="true" viewBox="0 0 340 400" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect x="20" y="20" width="300" height="360" stroke="currentColor" stroke-width="0.75"/>
        <rect x="55" y="55" width="230" height="290" stroke="currentColor" stroke-width="0.5" opacity="0.6"/>
        <rect x="90" y="90" width="160" height="220" stroke="currentColor" stroke-width="0.5" opacity="0.35" transform="rotate(8 170 200)"/>
        <line x1="20" y1="20" x2="60" y2="20" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        <line x1="20" y1="20" x2="20" y2="60" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        <line x1="320" y1="380" x2="280" y2="380" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        <line x1="320" y1="380" x2="320" y2="340" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
      <div class="error-page__inner">
        <p class="error-page__num">404</p>
        <div class="error-page__rule"></div>
        <h1>Page not found.</h1>
        <p>The page you're looking for doesn't exist or may have moved. Head back to the homepage or get in touch.</p>
        <div class="error-page__actions">
          <a href="index.html" class="btn btn--gold">Back to Home</a>
          <a href="contact.html" class="btn btn--ghost">Contact Us</a>
        </div>
      </div>
    </div>
  </main>

  <script src="js/main.js"></script>

</body>
</html>
